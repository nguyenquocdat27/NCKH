<!-- Add Farm Modal -->
<div id="add-farm-modal" class="modal items-center justify-center p-4">
  <div class="bg-white rounded-2xl p-5 sm:p-6 border border-slate-200 shadow-lg max-w-md w-full">
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-xl font-bold text-slate-800">Thêm vườn ớt mới</h3>
      <button onclick="closeAddFarmModal()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x" class="w-5 h-5"></i></button>
    </div>
    <form onsubmit="handleAddFarm(event)">
      <div class="mb-4">
        <label class="block text-sm font-medium text-slate-700 mb-2">Tên vườn <span class="text-red-500">*</span></label>
        <input type="text" id="farm-name" required class="w-full px-4 py-2.5 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500" placeholder="VD: Vườn ớt Tây Ninh">
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium text-slate-700 mb-2">Loại cây</label>
        <select id="farm-loaicay" class="w-full px-4 py-2.5 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500">
          <option value="Cây ớt">Cây ớt</option>
          <option value="Cây cà chua">Cây cà chua</option>
          <option value="Cây dưa hấu">Cây dưa hấu</option>
          <option value="Cây lúa">Cây lúa</option>
          <option value="Khác">Khác</option>
        </select>
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium text-slate-700 mb-2">Địa chỉ</label>
        <input type="text" id="farm-diachi" class="w-full px-4 py-2.5 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500" placeholder="VD: Tây Ninh">
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium text-slate-700 mb-2">Ghi chú</label>
        <textarea id="farm-ghichu" rows="2" class="w-full px-4 py-2.5 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500" placeholder="Thông tin thêm về vườn..."></textarea>
      </div>
      <div class="flex gap-3">
        <button type="button" onclick="closeAddFarmModal()" class="flex-1 px-4 py-2.5 border border-slate-300 text-slate-700 rounded-xl font-medium hover:bg-slate-50 transition-colors">Hủy</button>
        <button type="submit" class="flex-1 px-4 py-2.5 bg-red-500 hover:bg-red-600 text-white rounded-xl font-medium transition-colors flex items-center justify-center gap-2"><i data-lucide="plus" class="w-4 h-4"></i> Tạo vườn</button>
      </div>
    </form>
  </div>
</div>

<!-- Sensor Chart Modal -->
<div id="sensor-chart-modal" class="modal-chart">
  <div class="modal-chart-content">
    <div class="flex items-center justify-between mb-6">
      <h2 id="chart-title" class="text-2xl font-bold text-slate-800">Biểu đồ Nhiệt độ</h2>
      <button onclick="closeSensorChart()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x" class="w-6 h-6"></i></button>
    </div>
    <div class="chart-container"><canvas id="sensorChart"></canvas></div>
    <div id="chart-stats" class="grid grid-cols-1 sm:grid-cols-3 gap-4 mt-6">
      <div class="bg-slate-50 rounded-lg p-4"><p class="text-sm text-slate-600">Giá trị trung bình</p><p id="avg-value" class="text-2xl font-bold text-slate-800">--</p></div>
      <div class="bg-slate-50 rounded-lg p-4"><p class="text-sm text-slate-600">Giá trị cao nhất</p><p id="max-value" class="text-2xl font-bold text-red-600">--</p></div>
      <div class="bg-slate-50 rounded-lg p-4"><p class="text-sm text-slate-600">Giá trị thấp nhất</p><p id="min-value" class="text-2xl font-bold text-blue-600">--</p></div>
    </div>
  </div>
</div>
