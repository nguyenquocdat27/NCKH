<!-- ========== CHỌN CHẾ ĐỘ ========== -->
<div id="user-type-screen" class="page-content min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-10">
      <div class="w-20 h-20 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-red-500 to-orange-600 flex items-center justify-center shadow-lg">
        <i data-lucide="leaf" class="w-10 h-10 text-white"></i>
      </div>
      <h1 class="text-3xl font-bold gradient-text">AI Nông Nghiệp</h1>
      <p class="text-slate-500 mt-2">Chọn chế độ sử dụng</p>
    </div>
    <div class="space-y-5">
      <button type="button" onclick="selectUserType('personal')" class="card-hover w-full bg-white rounded-3xl p-6 border-2 border-transparent hover:border-green-200 text-left shadow-lg shadow-green-100/50 transition-all duration-300 group">
        <div class="flex items-center gap-5">
          <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-green-100 to-emerald-100 group-hover:from-green-500 group-hover:to-emerald-500 flex items-center justify-center transition-colors duration-300">
            <i data-lucide="camera" class="w-8 h-8 text-green-600 group-hover:text-white transition-colors duration-300"></i>
          </div>
          <div>
            <h3 class="text-lg font-bold text-slate-800">Người dùng cá nhân</h3>
            <p class="text-sm text-slate-500">Chụp ảnh lá cây và AI sẽ phân tích tình trạng dinh dưỡng</p>
          </div>
        </div>
      </button>
      <button type="button" onclick="selectUserType('pro')" class="card-hover w-full bg-white rounded-3xl p-6 border-2 border-transparent hover:border-blue-200 text-left shadow-lg shadow-blue-100/50 transition-all duration-300 group">
        <div class="flex items-center gap-5">
          <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-100 to-indigo-100 group-hover:from-blue-500 group-hover:to-indigo-500 flex items-center justify-center transition-colors duration-300">
            <i data-lucide="bar-chart-3" class="w-8 h-8 text-blue-600 group-hover:text-white transition-colors duration-300"></i>
          </div>
          <div>
            <h3 class="text-lg font-bold text-slate-800">Người dùng chuyên nghiệp</h3>
            <p class="text-sm text-slate-500">Truy cập dashboard quản lý và dữ liệu cảm biến</p>
          </div>
        </div>
      </button>
    </div>
  </div>
</div>
